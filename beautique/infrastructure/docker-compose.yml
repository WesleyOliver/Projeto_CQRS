version: '3.8'
services:
  postgres-beautique:
    image: postgres:17
    hostname: postgres-beautique
    environment:
      POSTGRES_DB: beautique
      POSTGRES_USER: beautique
      POSTGRES_PASSWORD: beautique
    volumes:
      - './db-beautique:/var/lib/postgresql/data'
      - './init-beautique-schema.sql:/docker-entrypoint-initdb.d/01-init-schema.sql'
    ports:
      - '3334:5432'
    networks:
      - beautique-network

networks:
  beautique-network:
    driver: bridge